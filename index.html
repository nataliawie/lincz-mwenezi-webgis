<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mwenezi District — WebGIS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="pmtiles.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0e1117;--surface:#161b24;--border:#252d3a;--text:#d4cfc7;--muted:#6b7280;--accent:#c8a96e;--panel-w:290px}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden}
    #header{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:#ffffff;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:16px;padding:0 16px}
    #header .logo{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--accent)}
    #header .sub{font-size:10px;color:#555;letter-spacing:.08em;text-transform:uppercase}
    #header .sep{flex:1}
    #header .coord-display{font-size:10px;color:#888}
    #map{position:fixed;top:56px;left:var(--panel-w);right:0;bottom:0}
    #panel{position:fixed;top:56px;left:0;bottom:0;width:var(--panel-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .panel-section{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
    .section-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .layer-item{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;border-radius:4px;transition:opacity .2s}
    .layer-item:hover{opacity:.8}
    .layer-item.off{opacity:.35}
    .layer-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0}
    .layer-name{font-size:11px;line-height:1.3;flex:1}
    .zoom-btn{font-size:9px;color:var(--muted);background:var(--border);border:none;border-radius:3px;padding:2px 5px;cursor:pointer;flex-shrink:0}
    .zoom-btn:hover{color:var(--accent)}
    #legend-box{padding:14px 16px;overflow-y:auto;flex:1}
    .legend-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .legend-group{margin-bottom:12px}
    .legend-group-name{font-size:10px;color:var(--accent);margin-bottom:6px}
    .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
    .legend-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,0.1)}
    .legend-row span{font-size:10px;color:var(--text)}
    .maplibregl-popup-content{background:var(--surface)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:6px!important;padding:12px 14px!important;font-family:'DM Mono',monospace!important;font-size:11px!important;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.5)!important}
    .popup-title{font-size:12px;color:var(--accent);margin-bottom:8px;font-family:'Fraunces',serif}
    .popup-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:3px}
    .popup-key{color:var(--muted)}
    .popup-val{color:var(--text);text-align:right;max-width:160px;word-break:break-word}
    .maplibregl-ctrl-group{background:var(--surface)!important;border:1px solid var(--border)!important}
    .maplibregl-ctrl-group button{background:transparent!important;color:var(--text)!important}
    .maplibregl-ctrl-attrib{display:none!important}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>

      'loss detected in 2005', '#feb24c', 'loss detected in 2006', '#fd9a3a',
      'loss detected in 2007', '#fc8127', 'loss detected in 2008', '#f86618',
      'loss detected in 2009', '#f0460f', 'loss detected in 2010', '#e52b0a',
      'loss detected in 2011', '#d41408', 'loss detected in 2012', '#c00007',
      'loss detected in 2013', '#ab0006', 'loss detected in 2014', '#960005',
      'loss detected in 2015', '#820004', 'loss detected in 2016', '#6e0003',
      'loss detected in 2017', '#5a0003', 'loss detected in 2018', '#470002',
      'loss detected in 2019', '#380002', 'loss detected in 2020', '#2a0001',
      'loss detected in 2021', '#200001', 'loss detected in 2022', '#160001',
      'loss detected in 2023', '#0e0001', 'loss detected in 2024', '#060000',
      '#888888'],
      'fill-opacity': 0.85 },
    legend: { title: 'Forest Loss 2001-2024', colors: FOREST_LOSS_COLORS },
    swatch: '#f86618' },

  { id: 'lulc-fill', label: 'Land Use / Land Cover 2024', sourceLayer: 'lulc_2024', type: 'fill',
    paint: { 'fill-color': ['match', ['get', 'class'],
      'Trees', '#2d6a2d', 'Crops', '#c8a96e', 'Built Area', '#c0392b',
      'Bare Ground', '#b5985a', 'Rangeland', '#7ab648',
      'Other (Flooded Vegetation)', '#5b8fa8', 'Other (Water)', '#3d7ab5', '#888888'],
      'fill-opacity': 0.75 },
    legend: { title: 'Land Use / Land Cover', colors: LULC_COLORS }, swatch: '#2d6a2d' },

  { id: 'protected-hatch', label: null, sourceLayer: 'protected_areas', type: 'fill',
    paint: { 'fill-color': 'rgba(80,160,80,0.0)' },
    legend: null, swatch: null },

  { id: 'protected-outline', label: 'Protected Areas', sourceLayer: 'protected_areas', type: 'line',
    paint: { 'line-color': '#50a050', 'line-width': 2.5, 'line-dasharray': [4, 2] },
    legend: null, swatch: 'transparent', swatchBorder: '#50a050' },

  { id: 'channels-line', label: 'Drainage Network', sourceLayer: 'channels', type: 'line',
    paint: { 'line-color': '#5b8fa8', 'line-width': 1.2, 'line-opacity': 0.9 },
    legend: null, swatch: '#5b8fa8' },

  { id: 'wards-line', label: 'Ward Boundaries', sourceLayer: 'ward_boundaries', type: 'line',
    paint: { 'line-color': '#ffffff', 'line-width': 2.5 },
    legend: null, swatch: 'transparent', swatchBorder: '#ffffff' },

  { id: 'project-areas-fill', label: 'MCC Project Areas', sourceLayer: 'project_areas', type: 'fill',
    paint: { 'fill-color': 'rgba(255,165,0,0.25)', 'fill-outline-color': '#ffa500' },
    legend: null, swatch: 'transparent', swatchBorder: '#ffa500', zoomTo: true },

  { id: 'project-areas-line', label: null, sourceLayer: 'project_areas', type: 'line',
    paint: { 'line-color': '#ffa500', 'line-width': 2.5 },
    legend: null, swatch: null },

  { id: 'waypoints-circle', label: 'MCC Project Waypoints', sourceLayer: 'project_waypoints', type: 'circle',
    paint: { 'circle-radius': 6, 'circle-color': '#ff6b35', 'circle-stroke-width': 1.5, 'circle-stroke-color': '#ffffff' },
    legend: null, swatch: '#ff6b35', zoomTo: true }
];

var visibility = {};

var companions = {
  'protected-outline': ['protected-hatch'],
  'project-areas-fill': ['project-areas-line'],
  'waypoints-circle': ['waypoint-labels'],
  'wards-line': ['ward-labels']
};

function addHatchPattern() { /* disabled */ }

function initLayers() {
  addHatchPattern();

  for (var i = 0; i < layerDefs.length; i++) {
    var def = layerDefs[i];
    visibility[def.id] = true;
    map.addLayer({
      id: def.id,
      type: def.type,
      source: 'mwenezi',
      'source-layer': def.sourceLayer,
      paint: def.paint,
      layout: { visibility: 'visible' }
    });
  }

  map.addLayer({ id: 'ward-labels', type: 'symbol', source: 'mwenezi', 'source-layer': 'ward_boundaries',
    layout: { 'text-field': ['coalesce', ['get', 'WARD_NAME'], ['get', 'name'], ['get', 'NAME']], 'text-font': ['Noto Sans Regular'], 'text-size': 10, visibility: 'visible' },
    paint: { 'text-color': '#ffffff', 'text-halo-color': '#000000', 'text-halo-width': 1.5 } });

  map.addLayer({ id: 'waypoint-labels', type: 'symbol', source: 'mwenezi', 'source-layer': 'project_waypoints',
    layout: { 'text-field': ['get', 'Name'], 'text-font': ['Noto Sans Regular'], 'text-size': 9, 'text-offset': [0, 1.2], 'text-anchor': 'top', visibility: 'visible' },
    paint: { 'text-color': '#ff6b35', 'text-halo-color': '#000000', 'text-halo-width': 1.5 } });

  buildPanel();

  // Satellite toggle
  var satelliteOn = true;
  document.getElementById('satellite-toggle').addEventListener('click', function() {
    satelliteOn = !satelliteOn;
    map.setLayoutProperty('satellite-base', 'visibility', satelliteOn ? 'visible' : 'none');
    this.classList.toggle('off', !satelliteOn);
  });
  buildLegend();
  setupPopups();
}

map.on('load', initLayers);

function buildPanel() {
  var list = document.getElementById('layer-list');
  var reversed = layerDefs.slice().reverse();
  for (var i = 0; i < reversed.length; i++) {
    var def = reversed[i];
    if (!def.label) continue;
    var item = document.createElement('div');
    item.className = 'layer-item';
    item.setAttribute('data-id', def.id);
    var swatchStyle = 'background:' + (def.swatch || 'transparent') + ';' + (def.swatchBorder ? 'border:1.5px solid ' + def.swatchBorder + ';' : '');
    var html = '<div class="layer-swatch" style="' + swatchStyle + '"></div>';
    html += '<div class="layer-name">' + def.label + '</div>';
    if (def.zoomTo) html += '<button class="zoom-btn" data-id="' + def.id + '">zoom</button>';
    item.innerHTML = html;

    (function(d, el) {
      el.addEventListener('click', function(e) {
        if (e.target.classList.contains('zoom-btn')) return;
        visibility[d.id] = !visibility[d.id];
        var toToggle = [d.id].concat(companions[d.id] || []);
        for (var j = 0; j < toToggle.length; j++) {
          try { map.setLayoutProperty(toToggle[j], 'visibility', visibility[d.id] ? 'visible' : 'none'); } catch(err) {}
        }
        el.classList.toggle('off', !visibility[d.id]);
      });
    })(def, item);

    var zBtn = item.querySelector('.zoom-btn');
    if (zBtn) {
      (function(d) {
        zBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          var b = BOUNDS[d.id];
          if (b) map.fitBounds([[b[0], b[1]], [b[2], b[3]]], { padding: 40, maxZoom: 16 });
        });
      })(def);
    }
    list.appendChild(item);
  }
}

function buildLegend() {
  var box = document.getElementById('legend-content');
  for (var i = 0; i < layerDefs.length; i++) {
    var def = layerDefs[i];
    if (!def.legend) continue;
    var group = document.createElement('div');
    group.className = 'legend-group';
    var html = '<div class="legend-group-name">' + def.legend.title + '</div>';
    var colors = def.legend.colors;
    for (var label in colors) {
      html += '<div class="legend-row"><div class="legend-swatch" style="background:' + colors[label] + '"></div><span>' + label + '</span></div>';
    }
    group.innerHTML = html;
    box.appendChild(group);
  }
}

function setupPopups() {
  var popup = new maplibregl.Popup({ closeButton: false, maxWidth: '280px' });
  var clickable = ['forest-loss-fill', 'lulc-fill', 'wards-line', 'protected-outline', 'project-areas-fill', 'waypoints-circle', 'agro-fill'];
  var titles = {
    'forest-loss-fill': 'Forest Loss',
    'lulc-fill': 'Land Use / Land Cover',
    'wards-line': 'Ward',
    'protected-outline': 'Protected Area',
    'project-areas-fill': 'MCC Project Area',
    'waypoints-circle': 'Waypoint',
    'agro-fill': 'Agroecological Zone'
  };

  for (var i = 0; i < clickable.length; i++) {
    (function(layerId) {
      map.on('click', layerId, function(e) {
        if (!visibility[layerId]) return;
        var props = e.features[0].properties;
        var rows = '';
        for (var k in props) {
          if (k !== 'fid' && k !== 'id' && k !== 'FID') {
            rows += '<div class="popup-row"><span class="popup-key">' + k + '</span><span class="popup-val">' + props[k] + '</span></div>';
          }
        }
        popup.setLngLat(e.lngLat).setHTML('<div class="popup-title">' + titles[layerId] + '</div>' + rows).addTo(map);
      });
      map.on('mouseenter', layerId, function() { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', layerId, function() { map.getCanvas().style.cursor = ''; });
    })(clickable[i]);
  }

  map.on('click', function(e) {
    if (!map.queryRenderedFeatures(e.point, { layers: clickable }).length) popup.remove();
  });
}
</script>
</body>
